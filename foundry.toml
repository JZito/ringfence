[profile.default]
src = "contracts"
test = "test"
script = "script"
out = "out"
libs = []
solc_version = "0.8.28"
auto_detect_solc = false
offline = true
optimizer = true
optimizer_runs = 200
fs_permissions = [
  { access = "read-write", path = "./config" }
]

[etherscan]
base = { key = "${ETHERSCAN_API_KEY}", url = "https://api.etherscan.io/v2/api?chainid=8453" }

[fmt]
line_length = 100
bracket_spacing = true
int_types = "long"
quote_style = "double"
number_underscore = "thousands"
