[build]
builder = "nixpacks"
buildCommand = "corepack enable && pnpm install --frozen-lockfile"

[deploy]
startCommand = "node --import tsx src/index.ts monitor serve"
healthcheckPath = "/api/public/state"
healthcheckTimeout = 30
restartPolicyType = "ON_FAILURE"
restartPolicyMaxRetries = 3

[service]
internalPort = 3000
